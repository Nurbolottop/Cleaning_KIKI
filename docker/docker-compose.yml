services:
  db_kiki:
    image: postgres:14
    container_name: postgres_db_kiki
    env_file:
      - ../.env
    ports:
      - "55432:5432"
    volumes:
      - postgres_data_kiki:/var/lib/postgresql/data
    networks:
      - portfolio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_kiki:
    image: redis:6
    container_name: redis_kiki
    ports:
      - "16379:6379"
    networks:
      - portfolio_network

  web_kiki:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: django_web_kiki
    command: sh -c "/entrypoint.sh && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8082"
    volumes:
      - ../app:/app
      - ../app/static:/app/static
      - ../app/media:/app/media
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      db_kiki:
        condition: service_healthy
      redis_kiki:
        condition: service_started
    ports:
      - "127.0.0.1:8085:8082"
    networks:
      - portfolio_network

  telegram_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram_bot_kiki
    command: python manage.py bot
    volumes:
      - ../app:/app
    env_file:
      - ../.env
    depends_on:
      - db_kiki
      - web_kiki
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge

volumes:
  postgres_data_kiki:
