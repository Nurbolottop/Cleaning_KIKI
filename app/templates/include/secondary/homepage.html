{% load static %}
<!DOCTYPE html>
<html lang="ky">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %} | {{ settings.title }}</title>
    <meta name="description" content="{% block meta_description %}{{ settings.description }}{% endblock %}" />
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}" />
    <link rel="canonical" href="https://cleaningkiki.kg{{ request.path }}" />

    <!-- Open Graph / соцсети -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ settings.title }}" />
    <meta property="og:title" content="{% block og_title %}{{ settings.title }}{% endblock %}" />
    <meta property="og:description" content="{% block og_description %}{{ settings.description }}{% endblock %}" />
    <meta property="og:url" content="https://cleaningkiki.kg{{ request.path }}" />
    {% block og_image %}{% if settings.logo %}<meta property="og:image" content="https://cleaningkiki.kg{{ settings.logo.url }}" />{% endif %}{% endblock %}
    <meta property="og:locale" content="ky_KG" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- favicons -->
    {% if settings.icon %}
    <link rel="apple-touch-icon" sizes="180x180" href="{{ settings.icon.url }}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ settings.icon.url }}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ settings.icon.url }}" />
    {% endif %}

    <!-- Структурированные данные для Google (локальный бизнес) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "{{ settings.title|escapejs }}",
        "description": "{{ settings.description|escapejs }}",
        "url": "https://cleaningkiki.kg/",
        {% if settings.logo %}"image": "https://cleaningkiki.kg{{ settings.logo.url }}",{% endif %}
        "telephone": "{{ settings.phone|escapejs }}",
        "email": "{{ settings.email|escapejs }}",
        "address": {
            "@type": "PostalAddress",
            "streetAddress": "{{ settings.locate|escapejs }}",
            "addressCountry": "KG"
        },
        "openingHours": "{{ settings.work_schedule|escapejs }}",
        "sameAs": [
            {% if settings.instagram %}"{{ settings.instagram }}"{% endif %}{% if settings.instagram and settings.facebook %},{% endif %}
            {% if settings.facebook %}"{{ settings.facebook }}"{% endif %}
        ]
    }
    </script>

    {% block extra_head %}{% endblock %}

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"></noscript>

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"></noscript>

    <!-- Иконочный шрифт нужен сразу (кнопки слайдера) — грузим заранее -->
    <link rel="preload" as="font" type="font/ttf" href="{% static 'assets/fonts/icomoon.ttf' %}" crossorigin>

    <!-- Все стили темы (включая custom и responsive) в одном бандле — scripts/build_css_bundle.py -->
    <link rel="stylesheet" href="{% static 'assets/css/bundle.css' %}" />
</head>

<body class="custom-cursor">
    <main>
    {% block content %}
    {% endblock %}
    </main>
    <script src="{% static 'assets/js/jquery-latest.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.appear.min.js' %}"></script>
    <script src="{% static 'assets/js/swiper.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.magnific-popup.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.validate.min.js' %}"></script>
    <script src="{% static 'assets/js/odometer.min.js' %}"></script>
    <script src="{% static 'assets/js/wow.js' %}"></script>
    <script src="{% static 'assets/js/isotope.js' %}"></script>
    <script src="{% static 'assets/js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.nice-select.min.js' %}"></script>
    <script src="{% static 'assets/js/twentytwenty.js' %}"></script>
    <script src="{% static 'assets/js/jquery.event.move.js' %}"></script>
    <script src="{% static 'assets/js/marquee.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery-sidebar-content.js' %}"></script>
    <script src="{% static 'assets/js/aos.js' %}"></script>

    <script src="{% static 'assets/js/gsap/gsap.js' %}"></script>
    <script src="{% static 'assets/js/gsap/ScrollTrigger.js' %}"></script>
    <script src="{% static 'assets/js/gsap/SplitText.js' %}"></script>

    <!-- custom js -->
    <script src="{% static 'assets/js/custom.js' %}"></script>
    <!-- template js -->
    <script src="{% static 'assets/js/script.js' %}"></script>
</body>

</html>
