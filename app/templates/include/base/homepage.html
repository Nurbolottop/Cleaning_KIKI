    <style>
        :root { --ny-snow-z: 9998; --ny-decor-z: 9999; }
        #ny-snow { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: var(--ny-snow-z); }
        .ny-garland { position: fixed; top: 0; left: 0; right: 0; height: 42px; z-index: var(--ny-decor-z); pointer-events: none; }
        .ny-garland__wire { position: absolute; left: -2vw; right: -2vw; top: 10px; height: 24px; border-bottom: 3px solid rgba(15, 25, 35, 0.55); border-radius: 0 0 60% 60% / 0 0 100% 100%; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25)); }
        .ny-garland__lights { position: absolute; top: 20px; left: 0; right: 0; display: flex; justify-content: space-around; gap: 10px; padding: 0 10px; }
        .ny-garland__bulb { width: 10px; height: 14px; border-radius: 999px; background: #ff4d6d; box-shadow: 0 0 10px rgba(255,77,109,0.8); animation: nyTwinkle 2.4s infinite ease-in-out; transform: translateY(-2px); }
        .ny-garland__bulb:nth-child(4n+1) { background: #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.85); animation-delay: .2s; }
        .ny-garland__bulb:nth-child(4n+2) { background: #f59e0b; box-shadow: 0 0 10px rgba(245,158,11,0.85); animation-delay: .6s; }
        .ny-garland__bulb:nth-child(4n+3) { background: #3b82f6; box-shadow: 0 0 10px rgba(59,130,246,0.85); animation-delay: 1s; }
        @keyframes nyTwinkle { 0%, 100% { opacity: .55; filter: saturate(0.9); } 50% { opacity: 1; filter: saturate(1.25); } }

        .ny-sticker { position: fixed; pointer-events: none; z-index: var(--ny-decor-z); filter: drop-shadow(0 10px 18px rgba(0,0,0,0.25)); }
        .ny-sticker--snowman { left: 14px; bottom: 18px; width: clamp(72px, 10vw, 120px); }
        .ny-sticker--gift { right: 14px; bottom: 16px; width: clamp(72px, 10vw, 120px); }
        .ny-sticker--grinch { right: -8px; top: 88px; width: clamp(84px, 11vw, 140px); transform: rotate(-6deg); }

        .ny-sticker svg { width: 100%; height: auto; display: block; }
        @media (max-width: 768px) {
            .ny-garland { height: 34px; }
            .ny-sticker--grinch { top: 72px; right: -10px; }
        }
    </style>
</head>

    <script>
        (function () {
            var canvas = document.getElementById('ny-snow');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var dpr = Math.max(1, window.devicePixelRatio || 1);
            var w = 0, h = 0;
            var flakes = [];
            var maxFlakes = 140;

            function resize() {
                w = Math.floor(window.innerWidth);
                h = Math.floor(window.innerHeight);
                canvas.width = Math.floor(w * dpr);
                canvas.height = Math.floor(h * dpr);
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            function rand(min, max) { return Math.random() * (max - min) + min; }

            function makeFlake(spawnTop) {
                return {
                    x: rand(0, w),
                    y: spawnTop ? rand(-h, 0) : rand(0, h),
                    r: rand(0.8, 2.8),
                    s: rand(0.6, 1.8),
                    a: rand(0, Math.PI * 2),
                    o: rand(0.25, 0.9)
                };
            }

            function init() {
                resize();
                flakes.length = 0;
                var count = Math.min(maxFlakes, Math.floor((w * h) / 9000));
                for (var i = 0; i < count; i++) flakes.push(makeFlake(false));
            }

            function step() {
                ctx.clearRect(0, 0, w, h);
                for (var i = 0; i < flakes.length; i++) {
                    var f = flakes[i];
                    f.a += 0.01 * f.s;
                    f.y += f.s;
                    f.x += Math.sin(f.a) * 0.6;
                    if (f.y - f.r > h) {
                        flakes[i] = makeFlake(true);
                        flakes[i].y = -10;
                    }
                    ctx.beginPath();
                    ctx.fillStyle = 'rgba(255,255,255,' + f.o + ')';
                    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                window.requestAnimationFrame(step);
            }

            window.addEventListener('resize', init, { passive: true });
            init();
            step();
        })();
    </script>
